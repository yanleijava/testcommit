syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.streamnative.worker.transfer.grpcgen";
option java_outer_classname = "TransferChunkProto";

package io.streamnative.worker.transfer;

message Chunk {
  bytes body = 1;
  string correlation_id = 2;
}

message ChunkAck {
  bool ok = 1;
  string detail = 2;
}

service ChunkIngress {
  rpc Push (Chunk) returns (ChunkAck);
}
